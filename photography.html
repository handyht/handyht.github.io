  <!-- ============================
       SCRIPTS
       ============================ -->
  <script>
    /* Load saved theme preference */
    if (localStorage.getItem('theme') === 'light') {
      document.documentElement.classList.add('light');
    }

    /* Fade-in elements when they scroll into view */
    const observer = new IntersectionObserver(
      (entries) => entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      }),
      { threshold: 0.1 }
    );
    document.querySelectorAll('.fade-in').forEach((el) => observer.observe(el));

    /**
     * Filter gallery by category.
     * Pass 'all' to show everything, or a category name like 'engagements'.
     */
    function filterCat(cat) {
      /* Update which filter button looks active */
      document.querySelectorAll('.cat-btn').forEach((btn) => {
        btn.classList.toggle('active',
          btn.textContent.toLowerCase() === cat ||
          (cat === 'all' && btn.textContent === 'All')
        );
      });

      /* Show/hide gallery items based on their data-cat attribute */
      document.querySelectorAll('[data-cat]').forEach((item) => {
        item.style.display = (cat === 'all' || item.dataset.cat === cat) ? '' : 'none';
      });
    }

    /* Open lightbox when clicking any gallery photo */
    document.querySelectorAll('.gallery-item').forEach((item) => {
      item.addEventListener('click', () => {
        document.getElementById('lightboxImg').src = item.querySelector('img').src;
        document.getElementById('lightbox').classList.add('active');
      });
    });
  </script>
